name: Build & Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  packages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build:api

      - uses: actions/upload-artifact@v4
        with:
          name: api
          path: dist/api/
          retention-days: 7

  build-container:
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api
          path: dist/api/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.ENV_DOCKER_USERNAME }}
          password: ${{ secrets.ENV_DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            secanis/tlscheck-api
            ghcr.io/secanis/tlscheck-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=0.0.0-dev,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=TLSCheck API
            org.opencontainers.image.description=TLS/SSL Certificate Checker API with OCSP/CRL revocation checking
            org.opencontainers.image.source=https://github.com/secanis/tlscheck
            org.opencontainers.image.licenses=AGPL-3.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.ENV_DOCKER_USERNAME }}
          password: ${{ secrets.ENV_DOCKER_PASSWORD }}
          repository: secanis/tlscheck-api
          short-description: "TLS/SSL Certificate Checker API with OCSP/CRL revocation checking"
          readme-filepath: README.md

  build-chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p 'require('./package.json').version')" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          sed -i 's/"version": "[^"]*"/"version": "'"${{ steps.version.outputs.VERSION }}"'"/' platforms/chrome/manifest.json

      - name: Build Chrome extension
        run: npm ci && npm run build:chrome
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Package as ZIP
        run: |
          cd dist/extension/chrome
          zip -r ../chrome-${{ steps.version.outputs.VERSION }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-v${{ steps.version.outputs.VERSION }}
          path: dist/extension/chrome/
          retention-days: 7

  build-docs:
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo 'VERSION=$(node -p "require('./package.json').version")' >> $GITHUB_OUTPUT

      - name: Update docs package.json version
        run: |
          cd docs
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - working-directory: docs
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: api
          path: dist/api/

      - name: Install API dependencies
        run: npm ci

      - name: Generate OpenAPI schema
        run: |
          node dist/api/index.js &
          API_PID=$!
          sleep 5
          curl -s http://localhost:3000/docs/json -o docs/openapi.json
          kill $API_PID || true

      - name: Update Astro config
        run: |
          sed -i "s|http://localhost:3000/docs/json|./openapi.json|g" docs/astro.config.mjs

      - working-directory: docs
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/dist/
          retention-days: 7

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
