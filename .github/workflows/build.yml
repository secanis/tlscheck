name: Build & Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build:api

      - uses: actions/upload-artifact@v4
        with:
          name: api
          path: dist/api/
          retention-days: 7

  build-chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build:chrome

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/extension/chrome/
          retention-days: 7

  build-docs:
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - working-directory: docs
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: api
          path: dist/api/

      - name: Install API dependencies
        run: npm ci

      - name: Generate OpenAPI schema
        run: |
          node dist/api/index.js &
          API_PID=$!
          sleep 5
          curl -s http://localhost:3000/docs/json -o docs/openapi.json
          kill $API_PID || true

      - name: Update Astro config
        run: |
          sed -i "s|http://localhost:3000/docs/json|./openapi.json|g" docs/astro.config.mjs

      - working-directory: docs
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/dist/
          retention-days: 7

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
