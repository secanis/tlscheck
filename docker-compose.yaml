version: "3.8"

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - tlscheck-network
    restart: unless-stopped

  tlscheck:
    image: ghcr.io/secanis/tlscheck-api:main
    container_name: tlscheck-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tlscheck.rule=Host(`tlscheck.example.com`)"
      - "traefik.http.routers.tlscheck.entrypoints=websecure"
      - "traefik.http.routers.tlscheck.tls=true"
      - "traefik.http.routers.tlscheck.tls.certresolver=letsencrypt"
      - "traefik.http.services.tlscheck.loadbalancer.server.port=3000"
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - CACHE_TTL_MS=1800000
      - REVOCATION_MODE=ocsp
      - RATE_LIMIT_MAX=30
      - RATE_LIMIT_WINDOW_MS=60000
    networks:
      - tlscheck-network
    restart: unless-stopped

networks:
  tlscheck-network:
    driver: bridge
